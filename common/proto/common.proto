syntax = "proto3";

package common;

option go_package = "common/gen/common";

import "google/protobuf/timestamp.proto";

message Pagination {
  int32 page = 1;
  int32 page_size = 2;
  int32 total = 3;
}

message RequestMetadata {
  string x_request_id = 1;
  string trace_id = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
  map<string, string> details = 3;
}

message Empty {}